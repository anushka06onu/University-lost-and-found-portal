spring.application.name=University Lost and Found Portal
server.port=${PORT:8080}

# Default to H2 for zero-config local development
spring.datasource.url=jdbc:h2:file:./data/lost_found_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Uncomment these for MySQL production/local setup
# spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/lost_found_db}
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:}
app.otp.expiry-minutes=5
app.mail.mock-mode=true
